{% extends 'base.html' %}

{% block title %}Orbit - PathAI{% endblock %}

{% block content %}
<div class="orbit-view">
    <h2>Your Goal Galaxy</h2>
    <div class="planets-container">
        {% for goal in goals %}
        <div class="planet {% if goal.is_active %}active{% endif %}" onclick="setActiveGoal({{ goal.id }})">
            <div class="planet-icon">🎯</div>
            <h3>{{ goal.title }}</h3>
            <p>{{ goal.progress_percentage }}% complete</p>
            <span class="tier-badge">Tier {{ goal.current_tier }}</span>
        </div>
        {% empty %}
        <p class="empty-orbit">No goals yet. Create one!</p>
        {% endfor %}
    </div>
    <button class="btn-primary" id="orbitAddBtn">+ New Goal</button>
</div>
{% endblock %}
